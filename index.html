<!doctype html>
<html>
  <head>
    <title>Prihod K</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 4rem;
        background-image: url("./media/china.jpg");
        background-size: cover;
        background-position: center;
      }
      img {
        position: fixed;
        width: 80px;
        height: 80px;
        user-select: none;
        pointer-events: none;
      }
      .timer {
        z-index: 1;
        font-weight: bold;
        font-size: 5rem;
        background: rgba(255, 0,  0, 1);
      }
      .container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
      .containerhor {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
}
#pet-embed {
  position: fixed;
  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  border: none;
  z-index: 9999;
}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="containerhor">
        <div class="k">K</div>
        <p style="background: rgba(255, 0,  0, 1);">KETOS pride čez</p></br>
        <div class="timer" id="timer"></div>
        <div class="k">K</div>
      </div>
      <iframe id="" width="314" height="321" scrolling="no" src="https://gify.pet/pet/pet.html?name=Hijek 2&dob=1781630853&gender=f&element=Earth&pet=cat.gif&map=forest.jpg&background=1995.png&tablecolor=%23ff0000&textcolor=%23000000" frameborder="0"></iframe>
    </div>


    <script>
      const target = new Date("2026-06-24T06:59:59");

      function update() {
        const diff = target - new Date();

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
        const mins = Math.floor(diff / (1000 * 60)) % 60;
        const secs = Math.floor(diff / 1000) % 60;

        document.getElementById("timer").textContent =
          `${days} dni ${hours} ur ${mins} min ${secs} sekund`;
      }

      setInterval(update, 1000);
      update();
    </script>

    <style>
      .k {
        font-size: 400px;
        font-weight: bold;
        color: yellow;
        opacity: 0.5;
        animation: spin 3s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <script>
const COUNT = 10;
const items = [];

let W = window.innerWidth;
let H = window.innerHeight;

// 🔥 CRITICAL FIX: use visualViewport if available
function updateSize() {
  W = window.innerWidth;
  H = window.visualViewport ? window.visualViewport.height : window.innerHeight;
}

updateSize();

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", updateSize);
} else {
  window.addEventListener("resize", updateSize);
}

for (let i = 0; i < COUNT; i++) {
  const el = document.createElement("img");
  el.src = "./media/magic.jpg";
  document.body.appendChild(el);

  items.push({
    el,
    x: Math.random() * (W - 50),
    y: Math.random() * (H - 50),
    vx: (Math.random() * 4 + 2) * (Math.random() < 0.5 ? -1 : 1),
    vy: (Math.random() * 4 + 2) * (Math.random() < 0.5 ? -1 : 1),
    angle: Math.random() * 360,
    spin: Math.random() * 4 - 2
  });
}

function animate() {
  for (const o of items) {
    o.x += o.vx;
    o.y += o.vy;
    o.angle += o.spin;

    const size = 50;

    if (o.x <= 0 || o.x >= W - size) o.vx *= -1;
    if (o.y <= 0 || o.y >= H - size) o.vy *= -1;

    o.x = Math.max(0, Math.min(W - size, o.x));
    o.y = Math.max(0, Math.min(H - size, o.y));

    o.el.style.left = o.x + "px";
    o.el.style.top = o.y + "px";
    o.el.style.transform = `rotate(${o.angle}deg)`;
  }

  requestAnimationFrame(animate);
}

animate();
</script>
    <script>
      const img = document.createElement("img");

      img.src = "./media/hijek.jpg";

      Object.assign(img.style, {
        position: "fixed",
        width: "100px",
        height: "100px",
        left: "100px",
        top: "100px",
        pointerEvents: "none",
        userSelect: "none",
      });

      document.body.appendChild(img);

      let x = 100;
      let y = 100;
      let vx = 4;
      let vy = 3;

      function animate1() {
        x += vx;
        y += vy;

        const w = img.offsetWidth;
        const h = img.offsetHeight;

        if (x <= 0 || x >= window.innerWidth - w) {
          vx *= -1;
        }

        if (y <= 0 || y >= window.innerHeight - h) {
          vy *= -1;
        }

        img.style.left = `${x}px`;
        img.style.top = `${y}px`;

        requestAnimationFrame(animate1);
      }

      img.onload = animate1;
    </script>
  </body>
</html>
